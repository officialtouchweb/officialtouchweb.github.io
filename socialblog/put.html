<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="socialBlog.js"></script>
    <link rel="stylesheet" href="socialBlog.css">
    <title>BlogWeb</title>
</head>
<body>
    <div id="navbar">
        <div class="overlay" id="overlay"></div>
        <div class="hamburger" id="hamburger">
            <div id="line1" class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </div>
        <div class="menu" id="menu">
            <ul>
                <li><a href="socialBlog.html">Home</a></li>
                <li><a href="read.html">Read Blogs</a></li>

            </ul>
        </div>
        <h1><b>BlogWeb</b></h1>
    </div>
    <h1>Put Your Blog</h1>
    <hr width="200px" color="purple">
    <div id="form">
        <input class="inp" type="name" name="name" id="name" placeholder="Enter your Name">
        <br>
        <input class="inp" type="email" name="email" id="email" placeholder="Enter your Email">
        <br>
        <input class="inp" type="number" name="number" id="number" placeholder="Enter your Ph. number">
        <br>
        <textarea class="inp" name="blog" id="blog" placeholder="Write your blog here"></textarea>
        <br>
        <button id="submit">Submit</button>
    </div>
</body>
