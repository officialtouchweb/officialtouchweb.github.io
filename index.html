<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Search Page</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js"></script>
</head>
<body>
    <h1>TouchWeb</h1>
    <b>All in one place</b>

    <!-- Search Bar -->
    <input type="text" id="search-bar" placeholder="Search..." onkeyup="filterTopics()" />

    <!-- Options -->
    <div class="options-container">
        <div class="option" onclick='gotoweb("Social Blog")'>
            <h3>Social Blog</h3>
            <p>The Social Media of Blogs</p>
        </div>
    </div>
</body>
</html>
